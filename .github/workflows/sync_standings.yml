name: Sync F1 Championship Standings

# Updates driver + constructor points in Supabase (Home / Grid tabs).
# Runs OpenF1 → session_results → vw_driver_standings / vw_constructor_standings
#
# Secrets (same as prediction pipeline):
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Season year'
        required: false
        default: '2026'
        type: string

  schedule:
    # After race weekends: Mon + Thu 07:00 UTC
    - cron: '0 7 * * 1'
    - cron: '0 7 * * 4'

concurrency:
  group: sync-standings
  cancel-in-progress: false

jobs:
  sync-standings:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ml_pipeline/requirements-standings.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml_pipeline/requirements-standings.txt

      - name: Sync standings from OpenF1 to Supabase
        working-directory: ml_pipeline
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          STANDINGS_YEAR:       ${{ github.event.inputs.year || '2026' }}
        run: python sync_standings.py --year "${STANDINGS_YEAR}"

      - name: Summary
        if: always()
        run: |
          echo "## Standings sync" >> $GITHUB_STEP_SUMMARY
          echo "- **Year**: ${{ github.event.inputs.year || '2026' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
