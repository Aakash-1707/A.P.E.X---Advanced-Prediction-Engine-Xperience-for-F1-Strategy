name: F1 2026 Prediction Pipeline

on:
  # ── Manual trigger (run from GitHub Actions UI) ───────────────────
  workflow_dispatch:
    inputs:
      gp_name:
        description: 'Grand Prix name (e.g. Spanish Grand Prix)'
        required: false
        default: ''
      mode:
        description: 'Mode: predictions | actuals_race | actuals_quali | actuals_both'
        required: false
        default: 'predictions'
      sims:
        description: 'Number of simulations'
        required: false
        default: '100000'

  # ── Scheduled runs ────────────────────────────────────────────────
  schedule:
    # Every Monday at 06:00 UTC — re-run upcoming GP predictions
    - cron: '0 6 * * 1'
    # Every Sunday at 16:00 UTC — sync race results (races finish ~14:00–15:30 UTC)
    - cron: '0 16 * * 0'
    # Every Saturday at 16:00 UTC — sync qualifying results
    - cron: '0 16 * * 6'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 100k sims can take ~30-60 min on GitHub runners

    steps:
      # ── 1. Checkout your repo ─────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install dependencies ───────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r ml_pipeline/requirements.txt

      # ── 4. Restore FastF1 cache (speeds up re-runs dramatically) ─
      - name: Restore FastF1 cache
        uses: actions/cache@v4
        with:
          path: ./ml_pipeline/f1_cache
          key: fastf1-cache-${{ runner.os }}-${{ hashFiles('ml_pipeline/requirements.txt') }}
          restore-keys: |
            fastf1-cache-${{ runner.os }}-

      # ── 5. Run pipeline ───────────────────────────────────────────
      - name: Run F1 pipeline
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        working-directory: ./ml_pipeline
        run: |
          MODE="${{ github.event.inputs.mode || 'predictions' }}"
          GP="${{ github.event.inputs.gp_name || '' }}"
          SIMS="${{ github.event.inputs.sims || '100000' }}"
          DAY=$(date +%u)   # 1=Mon ... 7=Sun

          echo "Mode: $MODE | GP: $GP | Sims: $SIMS | Day: $DAY"

          if [ "$MODE" = "predictions" ]; then
            if [ -n "$GP" ]; then
              # Specific GP requested manually
              python run_pipeline.py --gp "$GP" --sims "$SIMS"
            else
              # Scheduled Monday run: re-run all future GPs
              # (You can limit this to 2-3 upcoming GPs by editing run_pipeline.py)
              python run_pipeline.py --gp "$(python -c "
          from f1_2026_predictor import ALL_2026_GPS
          from datetime import date
          today = date.today()
          # Find next 3 upcoming GPs (just run the next one for speed)
          # Edit ALL_2026_GPS dates logic here if needed
          print(ALL_2026_GPS[0])
          ")" --sims "$SIMS"
            fi

          elif [ "$MODE" = "actuals_race" ]; then
            python run_pipeline.py --gp "$GP" --actuals race

          elif [ "$MODE" = "actuals_quali" ]; then
            python run_pipeline.py --gp "$GP" --actuals quali

          elif [ "$MODE" = "actuals_both" ]; then
            python run_pipeline.py --gp "$GP" --actuals both

          fi

      # ── 6. Save FastF1 cache ──────────────────────────────────────
      - name: Save FastF1 cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ./ml_pipeline/f1_cache
          key: fastf1-cache-${{ runner.os }}-${{ github.run_id }}