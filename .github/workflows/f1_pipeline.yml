name: F1 2026 Prediction Pipeline

# ──────────────────────────────────────────────────────────────────────
#  What this workflow does
#  ──────────────────────────────────────────────────────────────────────
#  Runs ml_pipeline/run_pipeline.py, which trains the APEX V7 XGBoost
#  predictor on all historical F1 data (via FastF1), computes 2026 race
#  + qualifying predictions, and upserts them into Supabase.
#
#  Triggers
#  ────────
#  • workflow_dispatch  — manual "Run workflow" button (optionally pin
#                         a single GP via the input)
#  • schedule (weekly)  — Monday 06:00 UTC → refresh every GP
#
#  Required repository secrets (Settings → Secrets and variables →
#  Actions → New repository secret):
#
#    SUPABASE_URL            https://<ref>.supabase.co
#    SUPABASE_SERVICE_KEY    service_role key (keep this PRIVATE)
# ──────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      gp_name:
        description: 'Grand Prix name (leave blank to run ALL 24 GPs)'
        required: false
        default: ''
        type: string
      skip_fresh_hours:
        description: 'With "all": skip GPs updated within this many hours (0 = never skip)'
        required: false
        default: '0'
        type: string

  schedule:
    # Every Monday at 06:00 UTC — full calendar refresh
    - cron: '0 6 * * 1'

# Only one pipeline run at a time so concurrent triggers don't race
# when writing to Supabase.
concurrency:
  group: f1-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # ~5 min for 24 GPs warm-cache, ~20-30 min cold

    env:
      # Avoid Intel OpenMP / MKL fork-safety warnings on CI runners.
      OMP_NUM_THREADS: '1'
      MKL_THREADING_LAYER: GNU
      KMP_INIT_AT_FORK: 'FALSE'
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ml_pipeline/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml_pipeline/requirements.txt

      # ── FastF1 session cache ─────────────────────────────────────────
      # Warm cache: full pipeline ≈ 5 min. Cold cache: 25–40 min.
      # We restore the latest cache and save a fresh copy at the end of
      # each run (keyed on run_id so we never collide).
      - name: Restore FastF1 cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ml_pipeline/f1_cache
          key: fastf1-cache-v1-${{ github.run_id }}
          restore-keys: |
            fastf1-cache-v1-

      - name: Run pipeline
        working-directory: ml_pipeline
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          GP='${{ github.event.inputs.gp_name }}'
          SKIP='${{ github.event.inputs.skip_fresh_hours }}'
          SKIP="${SKIP:-0}"

          echo "─────────────────────────────────────────────"
          echo "  Trigger    : ${{ github.event_name }}"
          echo "  GP target  : ${GP:-<all 24 GPs>}"
          echo "  Skip-fresh : ${SKIP}h"
          echo "─────────────────────────────────────────────"

          if [ -n "$GP" ]; then
            python run_pipeline.py --gp "$GP"
          else
            python run_pipeline.py --all --skip-fresh "$SKIP"
          fi

      - name: Save FastF1 cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ml_pipeline/f1_cache
          key: fastf1-cache-v1-${{ github.run_id }}

      - name: Pipeline summary
        if: always()
        run: |
          echo "## F1 2026 Pipeline run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **GP**: ${{ github.event.inputs.gp_name || '_all 24 GPs_' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
