name: F1 2026 Prediction Pipeline

# ──────────────────────────────────────────────────────────────────────
#  1. run_pipeline.py — APEX V7 predictions → Supabase
#  2. sync_standings.py — OpenF1 race results → Supabase
#     (feeds vw_driver_standings / vw_constructor_standings for Home + Grid)
#
#  Secrets: SUPABASE_URL, SUPABASE_SERVICE_KEY
# ──────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      gp_name:
        description: >-
          Grand Prix name or alias (e.g. "Barcelona Grand Prix", "Mexico City Grand Prix",
          "Madring", "São Paulo", or "latest" for the most recent completed race).
          Leave blank to run all 24 GPs.
        required: false
        default: ''
        type: string
      skip_fresh_hours:
        description: 'With "all": skip GPs updated within this many hours (0 = never skip)'
        required: false
        default: '0'
        type: string
      standings_only:
        description: 'Skip ML predictions; only sync driver/constructor points'
        required: false
        default: false
        type: boolean

  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: f1-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      OMP_NUM_THREADS: '1'
      MKL_THREADING_LAYER: GNU
      KMP_INIT_AT_FORK: 'FALSE'
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ml_pipeline/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml_pipeline/requirements.txt

      - name: Restore FastF1 cache
        if: ${{ !inputs.standings_only }}
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ml_pipeline/f1_cache
          key: fastf1-cache-v1-${{ github.run_id }}
          restore-keys: |
            fastf1-cache-v1-

      - name: Run pipeline
        if: ${{ !inputs.standings_only }}
        working-directory: ml_pipeline
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          GP='${{ github.event.inputs.gp_name }}'
          SKIP='${{ github.event.inputs.skip_fresh_hours }}'
          SKIP="${SKIP:-0}"

          echo "─────────────────────────────────────────────"
          echo "  Trigger    : ${{ github.event_name }}"
          echo "  GP target  : ${GP:-<all 24 GPs>}"
          echo "  Skip-fresh : ${SKIP}h"
          echo "─────────────────────────────────────────────"

          if [ -n "$GP" ]; then
            case "$GP" in
              latest|LATEST|__latest__)
                python run_pipeline.py --latest-race
                ;;
              *)
                python run_pipeline.py --gp "$GP"
                ;;
            esac
          else
            python run_pipeline.py --all --skip-fresh "$SKIP"
          fi

      - name: Sync championship standings
        if: always()
        working-directory: ml_pipeline
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python sync_standings.py

      - name: Save FastF1 cache
        if: always() && !inputs.standings_only
        uses: actions/cache/save@v4
        with:
          path: ml_pipeline/f1_cache
          key: fastf1-cache-v1-${{ github.run_id }}

      - name: Pipeline summary
        if: always()
        run: |
          echo "## F1 2026 Pipeline run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **GP**: ${{ github.event.inputs.gp_name || '_all 24 GPs_' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Standings only**: ${{ inputs.standings_only }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
